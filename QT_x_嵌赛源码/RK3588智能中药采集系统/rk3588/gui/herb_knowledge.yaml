# 药材知识库 — 离线问答 + 检测结果展示
# 当前 RKNN 模型仅支持：枸杞、白芷

herbs:
  枸杞:
    aliases: [gouqi, 枸杞子, 宁夏枸杞]
    detectable: true
    properties: |
      性状：呈类纺锤形或椭圆形，略弯曲，表面红色或暗红色，顶端有凸起状花柱痕，基部有白色果梗痕。
      质柔润，气微，味甜。
    efficacy: |
      功效：滋补肝肾，益精明目。
      主治：虚劳精亏，腰膝酸痛，眩晕耳鸣，内热消渴，血虚萎黄，目昏不明。
    usage: 一般用量 6~12g，入汤剂、丸散或泡茶。

  白芷:
    aliases: [baizhi, 白芨误称需区分]
    detectable: true
    properties: |
      性状：呈长圆锥形，表面灰黄色或黄棕色，有纵皱纹及长形的皮孔样横向突起，有的具四纵行排列的轮纹。
      质坚实，断面白色或类白色，粉性，形成层环 brown，皮部散有多数棕色油点，气芳香，味辛、微苦。
    efficacy: |
      功效：解表散寒，祛风止痛，宣通鼻窍，燥湿止带，消肿排脓。
      主治：感冒头痛，眉棱骨痛，鼻塞流涕，鼻鼽，鼻渊，带下，疮疡肿痛。
    usage: 一般用量 3~10g，不宜与热药同煎过久。

  熟地黄:
    aliases: [shudihuang, 熟地]
    detectable: false
    properties: 性状：呈不规则块状，内外均呈黑色，有光泽，黏性大，质柔软，气微，味甜。
    efficacy: 功效：补血滋阴，益精填髓。主治血虚萎黄，眩晕，心悸，月经不调，崩漏，肝肾阴虚等。
    usage: 一般用量 9~15g。

  莲肉:
    aliases: [lianrou, 莲子]
    detectable: false
    properties: 性状：呈椭圆形或类球形，表面红棕色或黄棕色，有纵纹，质坚硬，气微，味甘、微苦。
    efficacy: 功效：补脾止泻，益肾涩精，养心安神。主治脾虚久泻，遗精，带下，心悸失眠。
    usage: 一般用量 6~15g。

  白茯苓:
    aliases: [baifuling, 茯苓]
    detectable: false
    properties: 性状：为多孔菌科真菌茯苓的干燥菌核，呈不规则块状，表面白色或类白色，质较松，气微，味淡。
    efficacy: 功效：利水渗湿，健脾，宁心。主治水肿尿少，痰饮眩悸，脾虚食少，便溏泄泻，心神不安。
    usage: 一般用量 10~15g。

chat:
  welcome: |
    欢迎使用中药材知识问答。
    当前板端已接入识别模型：枸杞、白芷。
    您可提问，例如：「枸杞的性状是什么」「白芷的功效」。
  fallback: 暂未找到相关条目。请尝试提问「枸杞的性状」或「白芷的功效」，或先使用左侧检测功能识别药材。
